services:
  backend-db:
    build: ./core/data
    volumes:
      - ./core/data/pgdata:/var/lib/postgresql/data/data
    ports:
      - 7557:5432
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=rusalka-dev
      - PGDATA=/pgdata

  auth-db:
    build: ./web/client/data
    volumes:
      - ./web/client/data/pgdata:/var/lib/postgresql/data/data
    ports:
      - 7558:5432
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=rusalka-auth-dev
      - PGDATA=/pgdata
