services:
  postgres-db:
    image: postgres:17.6
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d  # For initializing multiple DBs
      - ./db/data:/var/lib/postgresql/data      # Persisted volume
    ports:
      - 7557:5432
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - PGDATA=/pgdata

  valkey-cache:
    image: valkey/valkey:8.1.3
    ports:
      - "6379:6379"  # Expose port for external access
    volumes:
      # - valkey_data:/data  # Persist Valkey data
      - ./valkey/valkey.conf:/usr/local/etc/valkey/valkey.conf:ro  # Custom config
    command: valkey-server /usr/local/etc/valkey/valkey.conf
    restart: unless-stopped
    environment:
      - VALKEY_DISABLE_COMMANDS=  # Optional: disable dangerous commands
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

